<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>📸 Reshoot — Stock à risque</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f2f2f0}
.header{background:#fff;border-bottom:1px solid #e8e8e6;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.header h1{font-size:15px;font-weight:700;color:#111}
.date{font-size:11px;color:#bbb}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(168px,1fr));gap:14px;padding:20px 24px 40px}
.card{background:#fff;border-radius:12px;overflow:hidden;text-decoration:none;color:inherit;display:flex;flex-direction:column;transition:transform .15s,box-shadow .15s}
.card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.1)}
.photo{aspect-ratio:3/4;overflow:hidden;background:#f0f0ee}
.photo img{width:100%;height:100%;object-fit:cover;display:block}
.info{padding:10px 12px 12px;display:flex;flex-direction:column;gap:3px}
.name{font-size:12px;font-weight:700;color:#111;line-height:1.3}
.sub{font-size:10px;color:#bbb}
.meta{font-size:10px;color:#999;margin-top:2px}
.link{margin-top:8px;font-size:11px;font-weight:700;color:#111}
</style>
</head>
<body>
<div class="header">
  <h1>📸 Reshoot — Stock à risque · 50 produits prioritaires</h1>
  <span class="date">Mise à jour {{DATE}}</span>
</div>
<div class="grid">
{{CARDS}}
</div>
</body>
</html>
