<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>📸 Reshoot — Stock à risque</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f4f4f2; padding: 24px; }
  header { display: flex; align-items: baseline; gap: 12px; margin-bottom: 8px; }
  h1 { font-size: 18px; font-weight: 700; color: #111; }
  #last-update { font-size: 12px; color: #aaa; }
  .subtitle { font-size: 13px; color: #999; margin-bottom: 24px; }

  /* Filtres */
  .filters { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .filter-btn { padding: 5px 14px; border-radius: 20px; border: 1.5px solid #ddd; background: #fff; font-size: 12px; font-weight: 600; cursor: pointer; color: #666; transition: all .15s; }
  .filter-btn:hover { border-color: #999; color: #111; }
  .filter-btn.active { background: #111; border-color: #111; color: #fff; }
  .filter-btn.red.active   { background: #e74c3c; border-color: #e74c3c; }
  .filter-btn.orange.active { background: #e67e22; border-color: #e67e22; }
  .filter-btn.yellow.active { background: #f39c12; border-color: #f39c12; }

  /* Grille */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 14px; }
  .card { background: #fff; border-radius: 10px; overflow: hidden; text-decoration: none; color: inherit; display: flex; flex-direction: column; transition: transform .15s, box-shadow .15s; }
  .card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,.12); }
  .card[hidden] { display: none; }
  .img-wrap { position: relative; aspect-ratio: 3/4; overflow: hidden; background: #f0f0ee; }
  .img-wrap img { width: 100%; height: 100%; object-fit: cover; }
  .badge { position: absolute; top: 8px; right: 8px; color: #fff; font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 20px; }
  .meta { padding: 9px 11px 11px; }
  .name { font-size: 12px; font-weight: 700; color: #111; line-height: 1.3; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .brand { font-size: 11px; color: #bbb; }

  /* States */
  #loading { text-align: center; padding: 60px; font-size: 14px; color: #999; }
  #error { text-align: center; padding: 40px; color: #e74c3c; font-size: 13px; }
  #count { font-size: 12px; color: #aaa; margin-bottom: 12px; }
</style>
</head>
<body>

<header>
  <h1>📸 Reshoot — Stock à risque</h1>
  <span id="last-update"></span>
</header>
<p class="subtitle">Données en direct depuis Metabase · mise à jour à chaque ouverture</p>

<div class="filters">
  <button class="filter-btn active" data-filter="all">Tous</button>
  <button class="filter-btn red"    data-filter="red">🔴 Critique ≥60</button>
  <button class="filter-btn orange" data-filter="orange">🟠 Urgent ≥45</button>
  <button class="filter-btn yellow" data-filter="yellow">🟡 Attention ≥35</button>
</div>

<div id="count"></div>
<div id="loading">Chargement des données Metabase…</div>
<div id="error" hidden></div>
<div class="grid" id="grid"></div>

<script>
const METABASE_URL = 'https://lecloset-metabase.lecloset.fr';
const CARD_ID = 4019;

function getUrgency(n) {
  if (n >= 60) return { color: '#e74c3c', label: '🔴 ' + n, tier: 'red' };
  if (n >= 45) return { color: '#e67e22', label: '🟠 ' + n, tier: 'orange' };
  if (n >= 35) return { color: '#f39c12', label: '🟡 ' + n, tier: 'yellow' };
  return { color: '#27ae60', label: '🟢 ' + n, tier: 'green' };
}

async function loadData() {
  const resp = await fetch(`${METABASE_URL}/api/card/${CARD_ID}/query`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-Metabase-Session': '' },
    credentials: 'include',
    body: JSON.stringify({})
  });
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  const data = await resp.json();
  return data.data;
}

function buildGrid(data) {
  const cols = data.cols.map(c => c.name);
  const idx = Object.fromEntries(cols.map((c, i) => [c, i]));
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  data.rows.forEach(row => {
    const name     = row[idx.product_name];
    const brand    = row[idx.brand_name];
    const imgUrl   = row[idx.main_picture_url];
    const factUrl  = row[idx.product_url];
    const atRisk   = row[idx.at_risk_item_count];
    const urg      = getUrgency(atRisk);

    const card = document.createElement('a');
    card.className = 'card';
    card.href = factUrl;
    card.target = '_blank';
    card.dataset.tier = urg.tier;
    card.style.borderTop = `3px solid ${urg.color}`;
    card.innerHTML = `
      <div class="img-wrap">
        <img src="${imgUrl}" alt="" loading="lazy" onerror="this.style.opacity=0">
        <span class="badge" style="background:${urg.color}">${urg.label}</span>
      </div>
      <div class="meta">
        <div class="name" title="${name}">${name}</div>
        <div class="brand">${brand}</div>
      </div>`;
    grid.appendChild(card);
  });

  document.getElementById('count').textContent = `${data.rows.length} produits`;
  document.getElementById('last-update').textContent =
    'Mis à jour ' + new Date().toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
}

function applyFilter(tier) {
  document.querySelectorAll('.card').forEach(card => {
    if (tier === 'all') {
      card.hidden = false;
    } else if (tier === 'red') {
      card.hidden = card.dataset.tier !== 'red';
    } else if (tier === 'orange') {
      card.hidden = !['red','orange'].includes(card.dataset.tier);
    } else if (tier === 'yellow') {
      card.hidden = !['red','orange','yellow'].includes(card.dataset.tier);
    }
  });
  const visible = document.querySelectorAll('.card:not([hidden])').length;
  document.getElementById('count').textContent = `${visible} produits`;
}

// Filtres
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    applyFilter(btn.dataset.filter);
  });
});

// Chargement
(async () => {
  try {
    const data = await loadData();
    document.getElementById('loading').hidden = true;
    buildGrid(data);
  } catch(e) {
    document.getElementById('loading').hidden = true;
    const errEl = document.getElementById('error');
    errEl.hidden = false;
    errEl.innerHTML = `
      ⚠️ Impossible de charger les données Metabase.<br>
      <small>Assure-toi d'être connecté·e à <a href="${METABASE_URL}" target="_blank">Metabase</a> dans un autre onglet, puis recharge cette page.</small>`;
  }
})();
</script>
</body>
</html>
